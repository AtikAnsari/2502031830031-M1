<!DOCTYPE html>
<html>
<head>
<style>
.left{
  float: left;
  padding: 15px; 
}

.right{
  float: right;
  padding: 15px; 
}
.none{
  float: none;
  padding: 15px; 
}

.div1 {
  background: red;
}

.div2 {
  background: yellow;
}

.div3 {
  background: green;
}
</style>
</head>
<body>

<h2> Float Properties</h2>
<div class="left">
<div class="div1">Div 1</div>
</div>
<div class="right">
<div class="div2">Div 2</div>
</div>
<div class="none">
<div class="div3">Div 3</div>
</div>
</body>
</html>
