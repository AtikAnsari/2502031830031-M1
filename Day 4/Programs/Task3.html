<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showing Datatype using typeof function</title>
</head>
<body>
    <h2>Showing All Data Types Using JavaScript</h2>
    <script>
        var a = 100n;
        var b = 10;
        var c = true;
        var d = "ABC" ; 
        var e
        var f = [a,b] ;
        var g = ["nme", "volvo","car"];

        document.write("100n is"+" "+ typeof a  +" "+"Data Type"+"<br>");
        document.write("10 is"+" "+ typeof b  +" "+"Data Type"+"<br>");
        document.write("true is"+" "+ typeof c  +" "+"Data Type"+"<br>");
        document.write("ABC is"+" "+ typeof d  +" "+"Data Type"+"<br>");
        document.write("var e is"+" "+ typeof e  +" "+"Data Type"+"<br>");
        document.write("var f is"+" "+ typeof f  +" "+"Data Type"+"<br>");
        document.write("var g is"+" "+ typeof g  +" "+"Data Type"+"<br>");


    </script>
</body>
</html>
