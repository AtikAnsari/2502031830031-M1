<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Performing Arithmetic Operator</h2>
    <script>
        var a = 10 + 20;
        var b = 20 - 10;
        var c = 10 * 20;
        var d = 10/20;
        var e = 10 % 20;

        document.writeln("Addition operation is Performed by '+' operator <br>")
        document.writeln("Example: 10 + 20:" + " "+ a + "<br><br>");

        document.writeln("Substraction operation is Performed by '-' operator <br>")
        document.writeln("Example: 20 - 10:" + " "+ b + "<br><br>");


        document.writeln("Multiplication operation is Performed by '*' operator <br>")
        document.writeln("Example: 10 * 20:" + " "+ c + "<br><br>");


        document.writeln("Division operation is Performed by '/' operator <br>")
        document.writeln("Example: 10/20:" + " "+ d + "<br><br>");


        document.writeln("Modulo operation is Performed by '%' operator <br>")
        document.writeln("Example: 10%20:" + " "+ e + "<br><br>");

    </script>

    <h2>Performing Post/Pre Increment/Decrement Operator </h2>
    <script>
        var a = 10;

        a++;

        var b = a;

        a--;

        var c = a;

        document.writeln("Increment operator is denoted by'++' symbol.<br>Example: a =10;<br> a++; <br>so output will be :" + " "+ b + "<br><br>");
        document.writeln("Increment operator is denoted by'--' symbol.<br>Example: a =11;<br> a--; <br>so output will be :" + " "+ c + "<br><br>");
        
    </script>
</body>
</html>
