<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-10 Number generation using for loop</title>
</head>
<body>
 
     <!-- 1-10 Number generation using for loop  -->
 
    <h2>1-10 Number generation using for loop</h2>
    <script>
        var i = 1;

        for(i=1;i<11;i++){
            document.write("<br>"+i)
        }
    </script>




        <!--Displaying Multiplication Table  -->
    <h2>Displaying Multiplication Table</h2>
    <script>
       var i = 1;
       var num = 5;

        for(i=1;i<11;i++){
            document.write("<br>"+ num +"x"+i+"="+num*i)
        } 
    </script>




        <!-- Generating Star Patterns -->
         <h2> Generating Star Patterns</h2>
         <script>
            var output="";
            for(i=1; i<=5; i++)
         {
            output+=i;
            output+="\n";
            document.writeln("<br>"+output);

         }

         </script>


<h2> Generating Reverse Star Patterns</h2>
<script>
   var output="";
   for(i=1; i<=5; i--)
{
   output-=i;
   output-="\n";
   document.writeln("<br>"+output);

}

</script>

</body>
</html>
