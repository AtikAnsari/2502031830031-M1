<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form using DOM</title>
</head>
<body>
    <h1>Form using DOM</h1>
    <form name="myForm">
        <h2>Name:<input type="text" name="uname"><br>
        Password:<input type="text" name="pword"><br></h2>
        <input type="button" value="Submit" onclick="f()">
        </form>

    <script>
        function f(){
            var a = document.forms["myForm"];
            var u = a.uname.value;
            var p = a.pword.value;


            if(u=="admin" && p=="123"){
                alert("valid");
            }
            else
            {
                alert("Invalid");
            }
        }
    </script>
</body>
</html>
