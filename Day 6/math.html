<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>

    document.writeln(Math.E);
    // Euler's number(approx.2.718)
    
    var a = Math.pow(2,3);
    
    document.writeln(a);
    // 8
    
    var num = Math.random();
    
    document.writeln(num);
    // 0.8124078072293648
    
    var num2 = parseInt(1 + (Math.random() * 100));
    
    document.writeln(num2);
    // Random Number betwween 1 to 100
    
    document.write(Math.ceil(2.7));
    // 3
    
    document.write(Math.floor(2.7));
    // 2
    
    document.write(Math.round(2.7));
    // 3
    
    </script>

</body>
</html>
